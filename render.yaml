services:
  # Backend FastAPI
  - type: web
    name: financeapp-api
    runtime: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: financeapp-db
          property: connectionString
      - key: SECRET_KEY
        generateValue: true
      - key: ALLOWED_ORIGINS
        value: https://financeapp-web.onrender.com

  # Frontend React (Static Site)
  - type: web
    name: financeapp-web
    runtime: static
    rootDir: front-end
    buildCommand: npm install && npm run build
    staticPublishPath: dist
    envVars:
      - key: VITE_API_URL
        value: https://financeapp-api.onrender.com
    routes:
      - type: rewrite
        source: /*
        destination: /index.html

databases:
  - name: financeapp-db
    databaseName: financeapp
    user: financeapp
    plan: free
